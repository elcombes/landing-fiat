<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Básico -->
    <title>Martin Co | FIAT Denver</title>
    <meta
      name="description"
      content="Encontrá tu próximo vehículo con el asesoramiento exclusivo de Martin Co. Consultá por disponibilidad de modelos y opciones de financiación personalizadas."
    />
    <meta
      name="keywords"
      content="Martin Co, Fiat, Peugeot, Automotores, Mendoza Shopping, Financiación, Autos"
    />
    <meta name="author" content="Martin Co" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Martin Co | Fiat Denver" />
    <meta
      property="og:description"
      content="Consultá por tu próximo vehículo con el asesoramiento exclusivo de Martin Co."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://formulario.martinco.com.ar/" />
    <meta property="og:image" content="ogg.jpg" />

    <link rel="icon" type="image/png" href="favicon.ico" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --lila: #403C98;
        --amarillo: #F47D38;
        --crema-form: #DCD8C7;

      body {
        font-family: "Montserrat", sans-serif;
        margin: 0;
        padding: 0;
        background-color: var(--amarillo);
      }

      .main-wrapper {
        background: linear-gradient(
          172deg,
          var(--lila) 20%,
          var(--amarillo) 55%
        );
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header-logos {
        padding: 30px 0;
        text-align: center;
      }
      .header-logos img {
        max-height: 45px;
        margin: 0 15px;
      }

      .hero-container {
        text-align: center;
        padding-bottom: 20px;
      }

      .img-hace-cambio {
        max-width: 85%;
        height: auto;
        margin-bottom: 40px;
      }

      .img-autos {
        max-width: 100%;
        height: auto;
        filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.2));
      }
      .martinco{
        max-width: 200px;
        height: auto;
      }

      .img-mendoza-shopping {
        max-width: 100px;
        height: auto;
        margin-top: -40px;
        margin-bottom: -50px;
        opacity: 0.9;
      }

      .form-section {
        padding: 40px 15px;
      }

      .custom-card {
        background-color: #fff;
        border: none;
        border-radius: 0 !important;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        padding: 40px;
        max-width: 550px;
        margin: 0 auto;
      }

      .custom-card h2 {
        color: #474747;
        font-weight: 900;
        margin-bottom: 30px;
        text-align: center;
      }

      .form-control {
        border-radius: 0 !important;
        border: 1px solid #ccc;
        padding: 12px;
        margin-bottom: 20px;
      }

      .valid-feedback-custom {
        color: #198754;
        font-size: 0.8rem;
        margin-top: -15px;
        margin-bottom: 15px;
        display: none;
      }

      .is-valid + .invalid-feedback + .valid-feedback-custom {
        display: block;
      }

      .btn-enviar {
        background-color: var(--lila);
        color: white;
        border: none;
        border-radius: 0 !important;
        padding: 15px;
        width: 100%;
        font-weight: bold;
        text-transform: uppercase;
        transition: 0.3s;
      }

      .textoblanco {
        color: white;
      }

      .btn-enviar:hover {
        background: #ED3A5F;
      }

      /* MODELOS */
      .model-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-bottom: 10px;
        padding: 10px;
        border: 1px solid #ddd;
        background: #fff;
        transition: 0.3s;
        max-height: 400px;
        overflow-y: auto;
      }

      .model-grid.is-invalid {
        border: 2px solid #dc3545;
      }

      .model-grid.is-valid {
        border: 2px solid #198754;
      }

      .model-option input {
        display: none;
      }

      .model-card {
        border: 2px solid #eee;
        padding: 10px;
        transition: 0.3s;
        text-align: center;
      }

      .model-card img {
        width: 100%;
      }

      .model-option input:checked + .model-card {
        border-color: var(--lila);
        background-color: rgba(75, 16, 152, 0.05);
      }

      .progress {
        height: 6px;
      }

      .model-card span {
        font-size: 0.75rem;
        font-weight: bold;
        text-transform: uppercase;
        color: #333;
      }

      .model-card small {
        display: block;
        font-size: 0.65rem;
        color: #666;
      }
    </style>
  </head>

  <body>
    <div class="main-wrapper">
      <header class="header-logos">
        <div class="container">
          <img src="logo-fiat-blanco.png" alt="Fiat" />
        </div>
      </header>

      <main class="hero-container container">
        <div class="row">
          <div class="col-12 textoblanco mt-5">
            <h2>¡ESTÁS A UN PASO DE TU PRÓXIMO 0KM!</h2>
          </div>
          <div class="col-12">
            <img src="autos.png" alt="Autos" class="img-autos" />
          </div>
        </div>
        <div class="row">
          <div class="col-12">
            <img src="logo-martinco-blanco.png" alt="Martin Co" class="martinco" />
          </div>
        </div>
      </main>

      <section class="form-section container">
        <div class="custom-card">
          <h2>Pedí más información</h2>

          <form id="leadForm" novalidate>
            <div class="progress mb-3">
              <div
                id="formProgress"
                class="progress-bar bg-success"
                style="width: 0%"
              ></div>
            </div>

            <input
              type="text"
              id="first_name"
              class="form-control"
              placeholder="Nombre"
              required
            />
            <div class="invalid-feedback">Ingresá solo letras.</div>
            <div class="valid-feedback-custom">✔ Perfecto</div>

            <input
              type="text"
              id="last_name"
              class="form-control"
              placeholder="Apellido"
              required
            />
            <div class="invalid-feedback">Ingresá solo letras.</div>
            <div class="valid-feedback-custom">✔ Perfecto</div>

            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="Email"
              required
            />
            <div class="invalid-feedback">Email inválido.</div>
            <div class="valid-feedback-custom">✔ Perfecto</div>

            <input
              type="tel"
              id="phone"
              class="form-control"
              placeholder="WhatsApp (sin +549)"
              required
            />
            <div class="invalid-feedback">Número argentino inválido.</div>
            <div class="valid-feedback-custom">✔ Perfecto</div>

            <label class="form-label fw-bold mb-2"
              >Seleccioná el modelo de tu interés:</label
            >

            <div id="modelGrid" class="model-grid">
              <!-- TODOS LOS MODELOS -->
              <label class="model-option"
                ><input
                  type="radio"
                  name="modelo_interes"
                  value="fiat_cronos"
                />
                <div class="model-card">
                  <img src="fiat-cronos.png" /><span>Fiat</span
                  ><small>Cronos</small>
                </div></label
              >
              <label class="model-option"
                ><input type="radio" name="modelo_interes" value="fiat_pulse" />
                <div class="model-card">
                  <img src="fiat-pulse.png" /><span>Fiat</span
                  ><small>Pulse</small>
                </div></label
              >
              <label class="model-option"
                ><input
                  type="radio"
                  name="modelo_interes"
                  value="fiat_strada"
                />
                <div class="model-card">
                  <img src="fiat-strada.png" /><span>Fiat</span
                  ><small>Strada</small>
                </div></label
              >
              <label class="model-option"
                ><input type="radio" name="modelo_interes" value="fiat_toro" />
                <div class="model-card">
                  <img src="fiat-toro.png" /><span>Fiat</span
                  ><small>Toro</small>
                </div></label
              >
              <label class="model-option"
                ><input
                  type="radio"
                  name="modelo_interes"
                  value="fiat_fastback"
                />
                <div class="model-card">
                  <img src="fiat-fastback.png" /><span>Fiat</span
                  ><small>Fastback</small>
                </div></label
              >
              <label class="model-option"
                ><input type="radio" name="modelo_interes" value="fiat_mobi" />
                <div class="model-card">
                  <img src="fiat-mobi.png" /><span>Fiat</span
                  ><small>Mobi</small>
                </div></label
              >
              <label class="model-option"
                ><input type="radio" name="modelo_interes" value="fiat_argo" />
                <div class="model-card">
                  <img src="fiat-argo.png" /><span>Fiat</span
                  ><small>Argo</small>
                </div></label
              >
              <label class="model-option"
                ><input
                  type="radio"
                  name="modelo_interes"
                  value="fiat_titano"
                />
                <div class="model-card">
                  <img src="fiat-titano.png" /><span>Fiat</span
                  ><small>Titano</small>
                </div></label
              >
              <label class="model-option"
                ><input
                  type="radio"
                  name="modelo_interes"
                  value="fiat_fiorino"
                />
                <div class="model-card">
                  <img src="fiat-fiorino.png" /><span>Fiat</span
                  ><small>Fiorino</small>
                </div></label
              >

              
            </div>

            <div
              class="invalid-feedback"
              id="modeloError"
              style="display: none"
            >
              Seleccioná un modelo.
            </div>
            <div
              class="valid-feedback-custom"
              id="modeloValid"
              style="display: none"
            >
              ✔ Perfecto
            </div>

            <button type="submit" class="btn btn-enviar">
              <span id="btnText">Enviar</span>
              <span
                id="spinner"
                class="spinner-border spinner-border-sm d-none"
              ></span>
            </button>
          </form>
        </div>
      </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
      function capitalizar(t) {
        return t.toLowerCase().replace(/\b\w/g, (l) => l.toUpperCase());
      }
      function validarTexto(t) {
        return /^[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+$/.test(t);
      }
      function validarTel(n) {
        n = n.replace(/\D/g, "");
        return n.length >= 10;
      }

      function validarModelo(mostrarError = false) {
        let modelo = document.querySelector(
          'input[name="modelo_interes"]:checked',
        );
        let grid = document.getElementById("modelGrid");

        if (modelo) {
          grid.classList.remove("is-invalid");
          grid.classList.add("is-valid");

          modeloError.style.display = "none";
          modeloValid.style.display = "block";

          return true;
        } else {
          grid.classList.remove("is-valid");
          modeloValid.style.display = "none";

          if (mostrarError) {
            grid.classList.add("is-invalid");
            modeloError.style.display = "block";
          } else {
            modeloError.style.display = "none";
          }

          return false;
        }
      }

      function updateProgress() {
        let total = 5;
        let valid = 0;

        if (first_name.classList.contains("is-valid")) valid++;
        if (last_name.classList.contains("is-valid")) valid++;
        if (email.classList.contains("is-valid")) valid++;
        if (phone.classList.contains("is-valid")) valid++;
        if (document.querySelector('input[name="modelo_interes"]:checked'))
          valid++;

        formProgress.style.width = (valid / total) * 100 + "%";
      }
      function validarCampo(i, cond) {
        if (cond) {
          i.classList.add("is-valid");
          i.classList.remove("is-invalid");
        } else {
          i.classList.add("is-invalid");
          i.classList.remove("is-valid");
        }
        updateProgress();
      }

      first_name.oninput = function () {
        validarCampo(this, validarTexto(this.value.trim()));
      };
      first_name.onblur = function () {
        this.value = capitalizar(this.value);
      };

      last_name.oninput = function () {
        validarCampo(this, validarTexto(this.value.trim()));
      };
      last_name.onblur = function () {
        this.value = capitalizar(this.value);
      };

      email.oninput = function () {
        validarCampo(this, this.checkValidity());
      };

      phone.oninput = function () {
        this.value = this.value.replace(/\D/g, "");
        validarCampo(this, validarTel(this.value));
      };

      document.querySelectorAll('input[name="modelo_interes"]').forEach((r) => {
        r.addEventListener("change", function () {
          validarModelo();
          updateProgress();
        });
      });

      leadForm.onsubmit = async function (e) {
        e.preventDefault();

        if (
          !first_name.classList.contains("is-valid") ||
          !last_name.classList.contains("is-valid") ||
          !email.classList.contains("is-valid") ||
          !phone.classList.contains("is-valid") ||
          !validarModelo(true)
        ) {
          Swal.fire({
            icon: "warning",
            title: "Completá todos los campos correctamente",
            confirmButtonColor: "#ED3A5F",
          });
          return;
        }

        let telefono = phone.value;
        if (!telefono.startsWith("549")) telefono = "+549" + telefono;

        btnText.classList.add("d-none");
        spinner.classList.remove("d-none");

        const payload = {
          first_name: first_name.value.trim(),
          last_name: last_name.value.trim(),
          email: email.value.trim(),
          phone: telefono,
          modelo_interes: document.querySelector(
            'input[name="modelo_interes"]:checked',
          ).value,
        };

        try {
          let r = await fetch("api.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!r.ok) throw new Error();

          Swal.fire({
            icon: "success",
            title: "¡Gracias!",
            text: "En breve un asesor se comunicará con vos.",
            confirmButtonColor: "#4b1098",
          });

          this.reset();
          document
            .querySelectorAll(".is-valid")
            .forEach((e) => e.classList.remove("is-valid"));
          document.getElementById("modelGrid").classList.remove("is-valid");
          modeloValid.style.display = "none";
          updateProgress();
        } catch {
          Swal.fire({
            icon: "error",
            title: "Ocurrió un error",
            confirmButtonColor: "#4b1098",
          });
        }

        btnText.classList.remove("d-none");
        spinner.classList.add("d-none");
      };
    </script>
  </body>
</html>
